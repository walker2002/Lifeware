# Domain Manifest - Timebox (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: timebox
version: 1.0.0
name: Timebox
description: 时间盒管理 — 将时间结构化为可执行的专注单元

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createTimebox
    shortcut: /createTimebox
    description: 创建一个新的时间盒
    response_type: cnui
    cnui_surface: create-timebox
    examples:
      - 帮我创建一个时间盒
      - 明天9点安排1小时专注写作
      - 下午2点到3点做代码审查
    keywords: [时间盒, timebox, 安排, 计划, 专注]
  - action: startTimebox
    shortcut: /startTimebox
    description: 开始执行一个时间盒
    examples:
      - 开始这个时间盒
      - 启动专注时间
    keywords: [开始, 启动, start]
  - action: endTimebox
    shortcut: /endTimebox
    description: 结束当前时间盒
    examples:
      - 结束时间盒
      - 完成这个专注时段
    keywords: [结束, 完成, end]
  - action: cancelTimebox
    shortcut: /cancelTimebox
    description: 取消一个计划中的时间盒
    examples:
      - 取消这个时间盒
    keywords: [取消, cancel]
  - action: logTimebox
    shortcut: /logTimebox
    description: 记录时间盒的执行结果
    response_type: cnui
    cnui_surface: log-timebox
    examples:
      - 记录执行结果
      - 这个时间盒完成度80%
      - 打卡所有时间盒
    keywords: [记录, log, 打卡]
  - action: viewSchedule
    shortcut: /schedule
    description: 查看今日时间盒日程
    examples:
      - 查看今天的日程
      - 今天有什么安排
    keywords: [日程, schedule, 安排, 今天]
    view_route: /schedule
  - action: createSmartSchedule
    shortcut: /smartSchedule
    description: AI 智能编排日程
    response_type: cnui
    cnui_surface: timebox-list
    examples:
      - 帮我智能安排今天的日程
      - 智能编排
      - 自动安排今天
    keywords: [智能编排, smart, 自动安排, 智能日程]
  - action: adjustRemainingSchedule
    shortcut: /adjustSchedule
    description: 根据剩余任务重新编排日程
    response_type: cnui
    cnui_surface: adjust-schedule
    examples:
      - 重新安排剩余时间
      - 调整今天下午的安排
    keywords: [调整, 重排, adjust]

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  timebox:
    states: [planned, running, overtime, ended, cancelled, logged]
    initial_state: planned
    transitions:
      - from: null
        to: planned
        trigger: intent
        action: create
        event_type: TimeboxCreated
      - from: planned
        to: running
        trigger: intent
        action: start
        event_type: TimeboxStarted
      - from: running
        to: ended
        trigger: intent
        action: end
        event_type: TimeboxEnded
      - from: running
        to: overtime
        trigger: time
        action: overtime
        event_type: TimeboxOvertime
      - from: overtime
        to: ended
        trigger: intent
        action: end
        event_type: TimeboxEnded
      - from: planned
        to: cancelled
        trigger: intent
        action: cancel
        event_type: TimeboxCancelled
      - from: ended
        to: logged
        trigger: intent
        action: log
        event_type: TimeboxLogged
    terminal_states: [cancelled, logged]

# ─── 区块 C: field_metadata ──────────────────────────────────────
field_metadata:
  title:
    type: string
    label: 标题
    required: true
  startTime:
    type: time
    label: 开始时间
    required: true
  duration:
    type: number
    label: 时长（分钟）
    required: true
  endTime:
    type: time
    label: 结束时间
    required: false
  startedAt:
    type: lifecycle_timestamp
    label: 实际开始时间
    required: false
  endedAt:
    type: lifecycle_timestamp
    label: 实际结束时间
    required: false
  overtimeAt:
    type: lifecycle_timestamp
    label: 超时标记时间
    required: false
  taskIds:
    type: json
    label: 关联任务
    required: false
  habitIds:
    type: json
    label: 关联习惯
    required: false
  executionRecord:
    type: json
    label: 执行记录
    required: false

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: start
    label: 开始
    confirm_required: false
  - action: end
    label: 结束
    confirm_required: false
  - action: cancel
    label: 取消
    confirm_required: true
  - action: log
    label: 记录结果
    confirm_required: false

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createTimebox:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：专注写作
    - name: startTime
      label: 开始时间
      type: time
      required: true
    - name: duration
      label: 时长（分钟）
      type: number
      required: true
      default_value: 60
  logTimebox:
    - name: completionRate
      label: 完成度
      type: number
      required: false
    - name: energyLevel
      label: 能量水平
      type: number
      required: false

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - TimeboxCreated
  - TimeboxStarted
  - TimeboxOvertime
  - TimeboxEnded
  - TimeboxCancelled
  - TimeboxLogged
  - ExecutionLogged

# ─── 区块 G: view_routes ─────────────────────────────────────────
# 仅列真页面跳转（[023] A2.9 OV#P3-#6 锁定）：
# - createTimebox 不绑 view_route（CNUI-only action，入口是 AI 助手翻页，
#   不绑 view_route；OV#P3-#6 移除）
# - 其余 view_route 沿用 src/app/<route>/page.tsx 路径，component 字段
#   标识实际入口组件（[023] A2.3 / A2.8 真实页面）。
view_routes:
  viewSchedule:
    component: app/schedule/page
    url: /schedule
  config_timebox_templates:
    component: app/timebox-templates/page
    url: /timebox-templates
  config_activity_archetypes:
    component: app/config/activity-archetypes/page
    url: /config/activity-archetypes

# ─── 区块 H: templates ───────────────────────────────────────────
templates:
  markdown:
    createTimebox:
      template_file: markdown_templates/timebox_plan.md
      description: 时间盒批量创建模板
      output_action: createTimebox
      max_objects: 20

# ─── 区块 I: generation_actions（生成型路径声明）────────────────
generation_actions:
  createSmartSchedule:
    description: 智能编排日程，根据任务/习惯/能量曲线自动生成时间盒方案
    contexts:
      - id: existingTimeboxes
        query: timeboxes_for_date
        params: [date, userId]
      - id: activeTasks
        query: active_with_details
        params: [userId]
      - id: pendingHabits
        query: unlogged_for_date
        params: [date, userId]
      - id: habitTemplates
        query: templates_for_date
        params: [date, userId]
      - id: energyCurve
        query: energy_curve
        params: []
    response_mode: cnui
    cnui_surface_type: timebox-list
    session_enabled: true
  adjustRemainingSchedule:
    description: 根据已完成项目调整剩余日程
    contexts:
      - id: existingTimeboxes
        query: timeboxes_for_date
        params: [date, userId]
      - id: activeTasks
        query: active_with_details
        params: [userId]
      - id: pendingHabits
        query: unlogged_for_date
        params: [date, userId]
      - id: energyCurve
        query: energy_curve
        params: []

# ─── 区块 J: cascade_rules ──────────────────────────────────────
cascade_rules:
  - on_event: 'ExecutionLogged'
    condition: "payload.sourceType == 'habit'"
    action: 'suggest_log_timebox'
    auto_execute: false

# ─── 区块 K: cnui_surfaces ─────────────────────────────────────
cnui_surfaces:
  timebox-list:
    description: 智能编排时间盒列表
    handler: ./cnui/handlers
  create-timebox:
    description: 多条 timebox 草稿创建（AI 解析→左右翻页→逐条提交）
    handler: ./cnui/handlers
  adjust-schedule:
    description: 调整日程（按时间序列左右翻页，diff 提交，running/ended 禁取消）
    handler: ./cnui/handlers
  log-timebox:
    description: 批量打卡（三态：完成/未完成/跳过 + 备注，逐条走 logTimebox）
    handler: ./cnui/handlers

