# Domain Manifest - Timebox (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: timebox
version: 1.0.0
name: Timebox
description: 时间盒管理 — 将时间结构化为可执行的专注单元

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createTimebox
    shortcut: /createTimebox
    description: 创建新的时间盒
    response_type: cnui
    cnui_surface: create-timebox
    examples:
      - 帮我创建一个时间盒
      - 明天9点安排1小时专注写作
      - 下午2点到3点做代码审查
      - 上午10:30-12:30 OKR 季度计划
      - 上午10:30-12:30 OKR 季度计划；下午16:00-18:00 带孩子出去玩
    keywords: [时间盒, timebox, 安排, 计划, 专注]
  # [023.04] T6：editTimeboxes 三合一入口（修改/取消/删除当日时间盒）。
  # 取代旧的 cancelTimebox shortcut — 通过 CNUI 解析优先模式 + 全字段表单 + 删除按钮。
  # cancelTimebox 在 lifecycle.transitions 仍作为 SM action（submitDynamicIntent('timebox', 'cancelTimebox', ...)），
  # 仅从 intent_triggers 移除 AI/shortcut 入口。
  - action: editTimeboxes
    shortcut: /editTimeboxes
    description: 修改/删除时间盒
    response_type: cnui
    cnui_surface: edit-timeboxes
    examples:
      - 把早上的会议改到下午 14:00
      - 把代码审查改到 16 点
      - 把下午客户拜访改期
      - 取消早上的会议
      - 删除下午的会议
      - 帮我看一下今天的时间盒
    keywords: [修改时间盒, 改时间盒, 改时间, 调整时间盒, 取消时间盒, 删除时间盒]
  - action: logTimebox
    shortcut: /logTimebox
    description: 记录时间盒的执行结果
    response_type: cnui
    cnui_surface: log-timebox
    examples:
      - 记录执行结果
      - 这个时间盒完成度80%
      - 打卡所有时间盒
    keywords: [记录, log, 打卡]
  - action: viewTimeboxes
    shortcut: /timeboxes
    description: 时间盒管理
    response_type: page
    examples:
      - 查看今天的时间盒
      - 今天有什么安排
    keywords: [时间盒, timebox, 安排, 今天]
    view_route: /timeboxes
  - action: configTimeboxTemplates
    shortcut: /timeboxTemplates
    description: 时间盒模板管理
    response_type: page
    examples:
      - 时间盒模板
      - 配置时间盒模板
    keywords: [模板, 时间盒模板, 模板管理]
    view_route: /timebox-templates
  - action: createSmartTimeboxes
    shortcut: /smartTimeboxes
    description: AI 智能编排时间盒
    response_type: cnui
    cnui_surface: create-smart-timebox
    examples:
      - 帮我智能安排今天的时间盒
      - 智能编排
      - 自动安排今天
    keywords: [智能编排, smart, 自动安排, 智能时间盒]
  # [023.10] T1.5: 撤销最近一次 batch 创建的时间盒 — 共享 create-smart-timebox
  # surface handler（cnui/handlers.ts:459-481 按 action 分派到 revert 分支）。
  # 不开新 cnui_surface key，复用 K 区块已有条目。
  - action: revertSmartTimeboxes
    description: 撤销最近一次 batch 创建的时间盒
    response_type: cnui
    cnui_surface: create-smart-timebox
  - action: adjustRemainingTimeboxes
    shortcut: /adjustTimeboxes
    description: 根据剩余任务重新编排时间盒
    response_type: cnui
    cnui_surface: adjust-timeboxes
    examples:
      - 重新安排剩余时间
      - 调整今天下午的安排
    keywords: [调整, 重排, adjust]
  # [026] A1.5 + [023.05] PR2 阶段 2: 约定管理 4 action（create/edit/delete/viewAppointments）
  # 注：markInProgress / markExpired 不在 intent_triggers——它们由 reconcile
  # 走 submitDynamicIntent 调 SM，无需 intent_trigger。
  - action: createAppointment
    shortcut: /createAppointment
    description: 增加一个未来约定
    response_type: cnui
    cnui_surface: create-appointment
    examples:
      - 7月15日下午2点看牙医
      - 下周三19:00 和张三吃饭
    keywords: [约定, 安排, 约会, 日历]
  - action: editAppointment
    shortcut: /editAppointment
    description: 修改一个计划或执行中的约定
    response_type: cnui
    cnui_surface: edit-appointment
    examples:
      - 把看牙医改到下午3点
    keywords: [修改约定, 改约定]
  - action: deleteAppointment
    shortcut: /deleteAppointment
    description: 删除计划或执行中的约定（可多选）
    response_type: cnui
    cnui_surface: delete-appointment
    examples:
      - 删掉下周的约定
    keywords: [删除约定]
  - action: viewAppointments
    shortcut: /appointments
    description: 约定管理
    response_type: page
    view_route: /appointments
    examples:
      - 看看我的约定
    keywords: [约定, 日历]

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  timebox:
    states: [planned, logged, cancelled]
    initial_state: planned
    transitions:
      - { from: null,      to: planned,   trigger: intent, action: create, event_type: TimeboxCreated }
      - { from: planned,   to: logged,    trigger: intent, action: log,    event_type: TimeboxLogged }
      - { from: planned,   to: cancelled, trigger: intent, action: cancel, event_type: TimeboxCancelled }
      - { from: logged,    to: planned,   trigger: intent, action: revert, event_type: TimeboxReverted }
      - { from: cancelled, to: planned,   trigger: intent, action: revert, event_type: TimeboxReverted }
    terminal_states: []
  # [023.12] T5: 3 态收敛（去掉 in_progress/expired 持久化——读时由
  # status/derive-display-status.ts 派生显示状态）。SM 仅驱动 create/cancel/complete/revert
  # 4 个动作；状态字段持久化：scheduled / cancelled / completed。
  appointment:
    states: [scheduled, cancelled, completed]
    initial_state: scheduled
    transitions:
      - { from: null,       to: scheduled, trigger: intent, action: create,   event_type: AppointmentCreated }
      - { from: scheduled,  to: cancelled, trigger: intent, action: cancel,   event_type: AppointmentCancelled }
      - { from: scheduled,  to: completed, trigger: intent, action: complete, event_type: AppointmentCompleted }
      - { from: cancelled,  to: scheduled, trigger: intent, action: revert,   event_type: AppointmentReverted }
      - { from: completed,  to: scheduled, trigger: intent, action: revert,   event_type: AppointmentReverted }
    terminal_states: []
    # 注：in_progress/expired 不再持久化——读时用 status/reconcile-appointment.ts 派生显示。
    # markInProgress / markExpired server actions 已删，cancel/complete/revert 由 SM 守门。

# ─── 区块 C: field_metadata（[026] T23：per-objectType 嵌套）
# 一级 key 为 objectType（timebox / itinerary），二级 key 为字段名。
# 消除跨 objectType 字段名潜在冲突（如 timebox.title 与 itinerary.title）。
field_metadata:
  timebox:
    title:
      type: string
      label: 标题
      required: true
    startTime:
      type: time
      label: 开始时间
      required: true
    duration:
      type: number
      label: 时长（分钟）
      required: true
    endTime:
      type: time
      label: 结束时间
      required: false
    taskIds:
      type: json
      label: 关联任务
      required: false
    habitIds:
      type: json
      label: 关联习惯
      required: false
    executionRecord:
      type: json
      label: 执行记录
      required: false
  # [026] A1.5 + [023.05] PR2 阶段 2: 约定字段元数据（仅追加 3 个；title/startTime 沿用 timebox 字段）
  # status/inProgressAt/expiredAt/completedAt/cancelledAt 不入 field_metadata
  # （SM-driven，不经 mutationService.update，避跨字段红线）
  appointment:
    title:
      type: string
      label: 标题
      required: true
    startTime:
      type: time
      label: 开始时间
      required: true
    durationMin:
      type: number
      label: 时长(分钟)
      required: true
      mutation_mode: FactField
    detail:
      type: string
      label: 详情
      required: false
      mutation_mode: ContentField
    people:
      type: json
      label: 关系人
      required: false
      mutation_mode: ContentField
    # [026.01] archetype FK 字段元数据（UUID 用 string type 标注，
    # 贴近 domain-types.ts FieldMetadata.type 合法取值集合）
    activityArchetypeId:
      type: string
      label: 活动原型
      required: false
      mutation_mode: ContentField

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: log
    label: 打卡
    confirm_required: false
  - action: cancel
    label: 取消
    confirm_required: true
  - action: revert
    label: 回退
    confirm_required: true
  - action: delete
    label: 删除
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createTimebox:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：专注写作
    - name: startTime
      label: 开始时间
      type: time
      required: true
    - name: duration
      label: 时长（分钟）
      type: number
      required: true
      default_value: 60
  logTimebox:
    - name: completionRate
      label: 完成度
      type: number
      required: false
    - name: energyLevel
      label: 能量水平
      type: number
      required: false

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - TimeboxCreated
  - TimeboxLogged
  - TimeboxCancelled
  - TimeboxReverted
  - ExecutionLogged

# ─── 区块 G: view_routes ─────────────────────────────────────────
# 仅列真页面跳转（[023] A2.9 OV#P3-#6 锁定）：
# - createTimebox 不绑 view_route（CNUI-only action，入口是 AI 助手翻页，
#   不绑 view_route；OV#P3-#6 移除）
# - 其余 view_route 沿用 src/app/<route>/page.tsx 路径，component 字段
#   标识实际入口组件（[023] A2.3 / A2.8 真实页面）。
view_routes:
  viewTimeboxes:
    component: app/timeboxes/page
    url: /timeboxes
  configTimeboxTemplates:
    component: domains/timebox/pages/TimeboxTemplatesPage
    url: /timebox-templates
  config_activity_archetypes:
    component: app/config/activity-archetypes/page
    url: /config/activity-archetypes
  # [026] A1.5 + [023.05] PR2 阶段 2: 约定管理页
  viewAppointments:
    component: app/appointments/page
    url: /appointments

# ─── 区块 H: templates ───────────────────────────────────────────
templates:
  markdown:
    createTimebox:
      template_file: markdown_templates/timebox_plan.md
      description: 时间盒批量创建模板
      output_action: createTimebox
      max_objects: 20

# ─── 区块 I: generation_actions（生成型路径声明）────────────────
generation_actions:
  createSmartTimeboxes:
    description: 智能编排时间盒，根据任务/习惯/能量曲线自动生成时间盒方案
    contexts:
      - id: existingTimeboxes
        query: timeboxes_for_date
        params: [date, userId]
      - id: activeTasks
        query: active_with_details
        params: [userId]
      - id: pendingHabits
        query: unlogged_for_date
        params: [date, userId]
      - id: energyCurve
        query: energy_curve
        params: []
    response_mode: cnui
    cnui_surface_type: create-smart-timebox
    session_enabled: true
  adjustRemainingTimeboxes:
    description: 根据已完成项目调整剩余时间盒
    contexts:
      - id: existingTimeboxes
        query: timeboxes_for_date
        params: [date, userId]
      - id: activeTasks
        query: active_with_details
        params: [userId]
      - id: pendingHabits
        query: unlogged_for_date
        params: [date, userId]
      - id: energyCurve
        query: energy_curve
        params: []

# ─── 区块 J: cascade_rules ──────────────────────────────────────
cascade_rules:
  - on_event: 'ExecutionLogged'
    condition: "payload.sourceType == 'habit'"
    action: 'suggest_log_timebox'
    auto_execute: false

# ─── 区块 K: cnui_surfaces ─────────────────────────────────────
cnui_surfaces:
  # [023.08] T5 — AI 智能推荐 surface（proposals 接受/拒绝 + 撤销 batch）
  #   替代原 timebox-list（[023.08] 前 generation_actions.cnui_surface_type=timebox-list 是初始占位）
  create-smart-timebox:
    description: AI 智能编排时间盒（proposals 接受/拒绝 + batch 撤销）
    handler: ./cnui/handlers
  create-timebox:
    description: 多条 timebox 草稿创建（AI 解析→左右翻页→逐条提交）
    handler: ./cnui/handlers
  adjust-timeboxes:
    description: 调整时间盒（按时间序列左右翻页，diff 提交，running/ended 禁取消）
    handler: ./cnui/handlers
  log-timebox:
    description: 批量打卡（三态：完成/未完成/跳过 + 备注，逐条走 logTimebox）
    handler: ./cnui/handlers
  # [026] A1.5 + [023.05] PR2 阶段 2: 约定管理 3 surface（K-block 错误待 A2 = T10 创建后清零）
  create-appointment:
    description: 增加约定（默认编辑表单/可切列表）
    handler: ./cnui/handlers
  edit-appointment:
    description: 修改约定（默认列表/选中切表单）
    handler: ./cnui/handlers
  delete-appointment:
    description: 删除约定（多选）
    handler: ./cnui/handlers
  # [023.04]：editTimeboxes 三合一（修改/取消/删除）
  edit-timeboxes:
    description: 修改/取消/删除时间盒（解析优先模式 + 全字段表单 + 删除按钮）
    handler: ./cnui/handlers

