# Domain Manifest - OKRs (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: okrs
version: 1.0.0
name: OKRs
description: 目标与关键结果管理 — 将愿景转化为可衡量的关键结果

# ─── 区块 A: intent_triggers ─────────────────────────────────────
# [022-A4] Phase 3 manifest 清理：移除所有 lifecycle action triggers（create/activate/pause/resume/
# complete/discard/archive/update 等），这些由 lifecycle 配置驱动走 SM，不走 AI intent 路由。
# 仅保留 okrs（导航类意图）作为 AI 可解析的入口。
intent_triggers:
  - action: okrs
    shortcut: /okrs
    description: OKR 工作台
    examples:
      - 查看我的 OKR
      - OKR 工作台
    keywords: [OKR, 工作台]
    view_route: /okrs
    response_type: page

# ─── 区块 B: lifecycle ───────────────────────────────────────────
# [022.01] Phase 3：objective / key_result 无独立状态机。
# 仅保留 null→draft 的 create 转换（最小外壳），以维持 orchestrator 管线：
#   - orchestrator/index.ts:951 getLifecycle 在 undefined 时抛错
#   - resolveObjectType(L120) / buildActionMap(L59) 也依赖 lifecycle keys
# draft 即初态也是终态——创建后无任何 SM 转换，字段写走 mutation-service。
lifecycle:
  objective:
    states: [draft]
    initial_state: draft
    transitions:
      - { from: null, to: draft, trigger: intent, action: create, event_type: ObjectiveCreated }
    terminal_states: [draft]
  key_result:
    states: [draft]
    initial_state: draft
    transitions:
      - { from: null, to: draft, trigger: intent, action: create, event_type: KeyResultUpdated }
    terminal_states: [draft]
  cycle:
    # [023.12] T6 收敛 4 态：draft/approved/finished/reviewed。
    # plan/start/end 三个旧动作整体退役（not_started 状态移除——
    # "周期未到开始日期"产品行为删，简化为"已批准即活跃"）。
    states: [draft, approved, finished, reviewed]
    initial_state: draft
    transitions:
      - { from: null,      to: draft,     trigger: intent, action: create, event_type: CycleCreated }
      - { from: draft,     to: approved,  trigger: intent, action: approve, event_type: CycleApproved }
      - { from: approved,  to: finished,  trigger: intent, action: finish,  event_type: CycleFinished }
      - { from: finished,  to: reviewed,  trigger: intent, action: review,  event_type: CycleReviewed }
      # [023.12] T6 AM10：revert 一步回退（reviewed→finished），不复位 reviewedAt
      # ——保留复盘证据。timebox/appointment revert to-initial；cycle 是反例。
      - { from: reviewed,  to: finished,  trigger: intent, action: revert,  event_type: CycleReverted }
    # 无终态：reviewed 可经 revert 回 finished，二次可重新走 finish→review。
    terminal_states: []

# ─── 区块 C: field_metadata ──────────────────────────────────────
# [022.01] Phase 3：移除 status 字段元数据（Objective/KR 不再含 status）。
# [026] T23：per-objectType 嵌套；objective + key_result 两类共享一套字段声明。
field_metadata:
  objective:
    title: { type: string, mutation_mode: ContentField }
    description: { type: string, mutation_mode: ContentField }
    okrType: { type: string, mutation_mode: ContentField }
    priority: { type: enum, mutation_mode: ContentField, options: [P0, P1, P2] }
    tags: { type: json, mutation_mode: ContentField }
    cycleId: { type: string, mutation_mode: FactField }
  key_result:
    title: { type: string, mutation_mode: ContentField }
    description: { type: string, mutation_mode: ContentField }
    targetValue: { type: number, mutation_mode: FactField }
    currentValue: { type: number, mutation_mode: FactField }
    unit: { type: string, mutation_mode: ContentField }
    progressRate: { type: number, mutation_mode: PresentationField }
    confidence: { type: number, mutation_mode: FactField }

# ─── 区块 D: list_actions ────────────────────────────────────────
# [022.01] Phase 3：移除 discard/archive list actions（Objective/KR 无独立状态机，
# 字段写通过 mutation-service 直走，无 list action 入口）。保留空数组以满足 schema。
list_actions: []

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createObjective:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：提升产品质量
  createKeyResult:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：代码覆盖率达到 80%
    - name: targetValue
      label: 目标值
      type: number
      required: true
    - name: unit
      label: 单位
      type: text
      required: true
      placeholder: 例如：%

# ─── 区块 F: subscribed_events ───────────────────────────────────
# [022.01] Phase 3：移除 Objective 状态事件（6 个），Cycle 状态事件保留。
# [023.12] T6：Cycle 事件随 lifecycle 收敛——删 CyclePlanned/CycleStarted，
# CycleEnded→CycleFinished，加 CycleApproved/CycleReverted。
subscribed_events:
  - ObjectiveCreated
  - KeyResultUpdated
  - KeyResultProgressUpdated
  - TaskCompleted
  - HabitLogged
  - OkrFieldUpdated
  - CycleCreated
  - CycleApproved
  - CycleFinished
  - CycleReviewed
  - CycleReverted

# ─── 区块 G: view_routes ─────────────────────────────────────────
view_routes:
  okrs:
    component: domains/okrs/components/okr-workspace
    # export_name：kebab→PascalCase 算出 OkrWorkspace，实际导出是缩写 OKRWorkspace
    export_name: OKRWorkspace
    url: /okrs
    # page_props：codegen 生成 async server page，透传 standalone + searchParams.detail
    page_props:
      standalone: true
      initialDetailId: { from: searchParams, key: detail }
  # 清理 [2026-07-13]：createObjective / createKeyResult 两个 view_route 已死
  # — 组件 ObjectiveFormPage / KeyResultFormPage 源码不存在，validate 报 component file not found。
  # 注意：区块 E required_fields 中相应的 createObjective / createKeyResult **保留**——
  # 它们是 onValidate 的真实业务校验规则（app/actions/okr.ts 实现 + __tests__/okr-domain.test.ts 覆盖），
  # 与 view_route 是两个独立概念，不可混为一谈。

# [022.01] Phase 3：移除 cascade_rules.parent_child_status 块（6 条）。
# SM 侧已有 null-safety：
#   - orchestrator/index.ts:955 getCascadeRules 在空数组时返回 undefined
#   - state-machine/index.ts:336 deps.getCascadeRules 为 undefined 时跳过 cascade 处理
