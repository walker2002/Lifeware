# Domain Manifest - OKRs (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: okrs
version: 1.0.0
name: OKRs
description: 目标与关键结果管理 — 将愿景转化为可衡量的关键结果

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createObjective
    shortcut: /createObjective
    description: 创建一个新的目标
    examples:
      - 创建一个新目标
      - 我想设定一个季度目标
    keywords: [目标, objective, OKR]
  - action: activateObjective
    shortcut: /activateObjective
    description: 激活一个目标
    examples:
      - 激活这个目标
      - 开始执行目标
    keywords: [激活, activate]
  - action: pauseObjective
    shortcut: /pauseObjective
    description: 暂停一个目标
    examples:
      - 暂停这个目标
    keywords: [暂停, pause]
  - action: resumeObjective
    shortcut: /resumeObjective
    description: 恢复一个暂停的目标
    examples:
      - 恢复这个目标
    keywords: [恢复, resume]
  - action: completeObjective
    shortcut: /completeObjective
    description: 完成一个目标
    examples:
      - 完成这个目标
      - 目标已完成
    keywords: [完成, complete]
  - action: discardObjective
    shortcut: /discardObjective
    description: 废弃一个目标
    examples:
      - 废弃这个目标
    keywords: [废弃, discard]
  - action: archiveObjective
    shortcut: /archiveObjective
    description: 归档一个目标
    examples:
      - 归档这个目标
    keywords: [归档, archive]
  - action: createKeyResult
    shortcut: /createKeyResult
    description: 创建一个关键结果
    examples:
      - 添加一个关键结果
      - 新增 KR
    keywords: [关键结果, KR, key result]
  - action: updateKeyResult
    shortcut: /updateKeyResult
    description: 更新关键结果
    examples:
      - 更新关键结果
    keywords: [更新, update]
  - action: updateKeyResultProgress
    shortcut: /updateProgress
    description: 更新关键结果进度
    examples:
      - 更新进度
      - KR 进度 50%
    keywords: [进度, progress]
  - action: view_workspace
    shortcut: /okrs
    description: 查看 OKR 工作台
    examples:
      - 查看我的 OKR
      - OKR 工作台
    keywords: [OKR, 工作台]
    view_route: /okrs
  - action: view_detail
    shortcut: /objectiveDetail
    description: 查看目标详情
    examples:
      - 查看目标详情
    keywords: [详情]
    view_route: /okrs/:id

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  objective:
    states: [draft, active, paused, completed, discarded, archived]
    initial_state: draft
    transitions:
      - from: null
        to: draft
        trigger: intent
        action: create
        event_type: ObjectiveCreated
      - from: draft
        to: active
        trigger: intent
        action: activate
        event_type: ObjectiveActivated
      - from: draft
        to: discarded
        trigger: intent
        action: discard
        event_type: ObjectiveDiscarded
      - from: active
        to: paused
        trigger: intent
        action: pause
        event_type: ObjectivePaused
      - from: active
        to: completed
        trigger: intent
        action: complete
        event_type: ObjectiveCompleted
      - from: active
        to: discarded
        trigger: intent
        action: discard
        event_type: ObjectiveDiscarded
      - from: paused
        to: active
        trigger: intent
        action: resume
        event_type: ObjectiveResumed
      - from: paused
        to: discarded
        trigger: intent
        action: discard
        event_type: ObjectiveDiscarded
      - from: completed
        to: archived
        trigger: intent
        action: archive
        event_type: ObjectiveArchived
      - from: discarded
        to: archived
        trigger: intent
        action: archive
        event_type: ObjectiveArchived
    terminal_states: [archived]
  key_result:
    states: [draft, active, paused, completed, discarded, archived]
    initial_state: draft
    transitions:
      - from: null
        to: draft
        trigger: intent
        action: create
        event_type: KeyResultUpdated
      - from: draft
        to: active
        trigger: intent
        action: activate
        event_type: KeyResultUpdated
      - from: draft
        to: discarded
        trigger: intent
        action: discard
        event_type: KeyResultUpdated
      - from: active
        to: paused
        trigger: intent
        action: pause
        event_type: KeyResultUpdated
      - from: active
        to: completed
        trigger: intent
        action: complete
        event_type: KeyResultCompleted
      - from: active
        to: discarded
        trigger: intent
        action: discard
        event_type: KeyResultUpdated
      - from: paused
        to: active
        trigger: intent
        action: resume
        event_type: KeyResultUpdated
      - from: paused
        to: discarded
        trigger: intent
        action: discard
        event_type: KeyResultUpdated
      - from: completed
        to: archived
        trigger: intent
        action: archive
        event_type: KeyResultUpdated
      - from: discarded
        to: archived
        trigger: intent
        action: archive
        event_type: KeyResultUpdated
    terminal_states: [archived]
  cycle:
    states: [draft, not_started, in_progress, ended, reviewed]
    initial_state: draft
    transitions:
      - { from: null, to: draft, trigger: intent, action: create, event_type: CycleCreated }
      - { from: draft, to: not_started, trigger: intent, action: plan, event_type: CyclePlanned }
      - { from: not_started, to: in_progress, trigger: intent, action: start, event_type: CycleStarted }
      - { from: in_progress, to: ended, trigger: intent, action: end, event_type: CycleEnded }
      - { from: ended, to: reviewed, trigger: intent, action: review, event_type: CycleReviewed }
    terminal_states: [reviewed]

# ─── 区块 C: field_metadata ──────────────────────────────────────
field_metadata:
  title: { type: string, mutation_mode: ContentField }
  description: { type: string, mutation_mode: ContentField }
  okrType: { type: string, mutation_mode: ContentField }
  priority: { type: enum, mutation_mode: ContentField, options: [P0, P1, P2] }
  tags: { type: json, mutation_mode: ContentField }
  cycleId: { type: string, mutation_mode: FactField }
  status: { type: enum, mutation_mode: FactField, options: [draft, active, paused, completed, discarded, archived] }
  targetValue: { type: number, mutation_mode: FactField }
  currentValue: { type: number, mutation_mode: FactField }
  unit: { type: string, mutation_mode: ContentField }
  progressRate: { type: number, mutation_mode: PresentationField }

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: discard
    label: 废弃
    confirm_required: true
  - action: archive
    label: 归档
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createObjective:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：提升产品质量
  createKeyResult:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：代码覆盖率达到 80%
    - name: targetValue
      label: 目标值
      type: number
      required: true
    - name: unit
      label: 单位
      type: text
      required: true
      placeholder: 例如：%

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - ObjectiveCreated
  - ObjectiveActivated
  - ObjectivePaused
  - ObjectiveResumed
  - ObjectiveCompleted
  - ObjectiveDiscarded
  - ObjectiveArchived
  - KeyResultUpdated
  - KeyResultCompleted
  - KeyResultProgressUpdated
  - TaskCompleted
  - HabitLogged
  - OkrFieldUpdated
  - CycleCreated
  - CyclePlanned
  - CycleStarted
  - CycleEnded
  - CycleReviewed

# ─── 区块 G: view_routes ─────────────────────────────────────────
view_routes:
  createObjective:
    component: domains/okrs/pages/ObjectiveFormPage
    url: /okrs/objectives/new
    params:
      mode: create
  createKeyResult:
    component: domains/okrs/pages/KeyResultFormPage
    url: /okrs/key-results/new
    params:
      mode: create
  view_workspace:
    component: domains/okrs/pages/OKRWorkspacePage
    url: /okrs
  view_detail:
    component: domains/okrs/pages/ObjectiveDetailPage
    url: /okrs/:id

# ─── 区块 H: cascade_rules ─────────────────────────────────────────
cascade_rules:
  - type: parent_child_status
    parent_object: objective
    child_object: key_result
    child_query: findByParent
    rules:
      - parent_action: activate
        child_filter: "status == 'draft'"
        child_to_status: active
        event_type: KeyResultActivated
      - parent_action: pause
        child_filter: "status == 'active'"
        child_to_status: paused
        event_type: KeyResultPaused
      - parent_action: resume
        child_filter: "status == 'paused'"
        child_to_status: active
        event_type: KeyResultResumed
      - parent_action: complete
        child_filter: "status in ['active','paused']"
        child_to_status: completed
        event_type: KeyResultCompleted
      - parent_action: discard
        child_filter: "status not in ['discarded','archived']"
        child_to_status: discarded
        event_type: KeyResultDiscarded
      - parent_action: archive
        child_filter: "status != 'archived'"
        child_to_status: archived
        event_type: KeyResultArchived
