# Domain Manifest - Habits (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: habits
version: 1.0.0
name: Habits
description: 习惯管理 — 建立和跟踪日常习惯，支持连续打卡和模板化

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createHabit
    description: 创建一个新习惯
    examples:
      - 帮我创建一个每天跑步的习惯
      - 新增一个冥想习惯
    keywords: [习惯, habit, 新增, 创建]
  - action: activateHabit
    description: 激活一个草稿状态的习惯
    examples:
      - 激活这个习惯
      - 开始执行晨跑习惯
    keywords: [激活, activate]
  - action: suspendHabit
    description: 暂停一个活跃中的习惯
    examples:
      - 暂停这个习惯
      - 暂时停止冥想
    keywords: [暂停, suspend]
  - action: archiveHabit
    description: 归档一个已暂停的习惯
    examples:
      - 归档这个习惯
    keywords: [归档, archive]
  - action: reactivateHabit
    description: 重新激活一个已暂停的习惯
    examples:
      - 恢复这个习惯
      - 重新开始冥想
    keywords: [恢复, 重新激活, reactivate]
  - action: logHabit
    description: 记录习惯打卡
    examples:
      - 打卡晨跑
      - 今天冥想完成
    keywords: [打卡, log, 完成]
  - action: view_list
    description: 查看习惯列表
    examples:
      - 查看我的习惯
      - 有哪些习惯
    keywords: [习惯列表, 查看]
    view_route: /habits
  - action: view_templates
    description: 查看习惯模板
    examples:
      - 查看习惯模板
      - 有什么模板可以用
    keywords: [模板, template]
    view_route: /habits/templates

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  habit:
    states: [draft, active, suspended, archived]
    initial_state: draft
    transitions:
      - from: null
        to: draft
        trigger: intent
        action: create
        event_type: HabitCreated
      - from: draft
        to: active
        trigger: intent
        action: activate
        event_type: HabitActivated
      - from: active
        to: suspended
        trigger: intent
        action: suspend
        event_type: HabitSuspended
      - from: suspended
        to: active
        trigger: intent
        action: reactivate
        event_type: HabitActivated
      - from: suspended
        to: archived
        trigger: intent
        action: archive
        event_type: HabitArchived
    terminal_states: [archived]

# ─── 区块 C: field_metadata ──────────────────────────────────────
field_metadata:
  title:
    type: string
    label: 标题
    required: true
  defaultTime:
    type: time
    label: 默认执行时间
    required: true
  defaultDuration:
    type: number
    label: 默认时长（分钟）
    required: true
  frequencyType:
    type: string
    label: 频率类型
    required: false
    allowed_values: [daily, weekly, custom]
  daysOfWeek:
    type: json
    label: 每周执行日
    required: false
  trackable:
    type: boolean
    label: 可打卡
    required: true
  minDuration:
    type: number
    label: 最小时长（分钟）
    required: false

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: activate
    label: 激活
    confirm_required: false
  - action: suspend
    label: 暂停
    confirm_required: false
  - action: reactivate
    label: 恢复
    confirm_required: false
  - action: archive
    label: 归档
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createHabit:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：晨跑
    - name: defaultTime
      label: 默认执行时间
      type: time
      required: true
    - name: defaultDuration
      label: 默认时长（分钟）
      type: number
      required: true
      default_value: 30
    - name: trackable
      label: 可打卡
      type: boolean
      required: true
      default_value: true

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - HabitCreated
  - HabitActivated
  - HabitSuspended
  - HabitArchived
  - HabitLogged
  - HabitSkipped
  - HabitStreakMilestone
