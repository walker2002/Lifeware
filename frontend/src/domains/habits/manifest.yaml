# Domain Manifest - Habits (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: habits
version: 1.0.0
name: Habits
description: 习惯管理 — 建立和跟踪日常习惯，支持连续打卡和模板化

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createHabit
    shortcut: /createHabit
    description: 创建新习惯
    response_type: cnui
    cnui_surface: habit-creation-card
    examples:
      - 帮我创建一个每天跑步的习惯
      - 新增一个冥想习惯
    keywords: [习惯, habit, 新增, 创建]
  - action: activateHabit
    shortcut: /activateHabit
    description: 激活草稿状态的习惯
    response_type: cnui
    cnui_surface: habit-action-panel
    examples:
      - 激活这个习惯
      - 开始执行晨跑习惯
    keywords: [激活, activate]
  - action: suspendHabit
    shortcut: /suspendHabit
    description: 暂停活跃中的习惯
    response_type: cnui
    cnui_surface: habit-action-panel
    examples:
      - 暂停这个习惯
      - 暂时停止冥想
    keywords: [暂停, suspend]
  - action: archiveHabit
    shortcut: /archiveHabit
    description: 归档已暂停的习惯
    response_type: cnui
    cnui_surface: habit-action-panel
    examples:
      - 归档这个习惯
    keywords: [归档, archive]
  - action: reactivateHabit
    shortcut: /reactivateHabit
    description: 重新激活已暂停的习惯
    response_type: cnui
    cnui_surface: habit-action-panel
    examples:
      - 恢复这个习惯
      - 重新开始冥想
    keywords: [恢复, 重新激活, reactivate]
  - action: logHabit
    shortcut: /logHabit
    description: 记录习惯打卡
    response_type: cnui
    cnui_surface: habit-checkin-panel
    examples:
      - 打卡晨跑
      - 今天冥想完成
    keywords: [打卡, log, 完成]
  - action: deleteHabit
    shortcut: /deleteHabit
    description: 删除习惯（不可恢复）
    response_type: cnui
    cnui_surface: habit-action-panel
    examples:
      - 删除这个习惯
    keywords: [删除, delete]
  - action: view_list
    shortcut: /habits
    description: 习惯管理
    response_type: page
    examples:
      - 查看我的习惯
      - 有哪些习惯
    keywords: [习惯列表, 查看]
    view_route: /habits
  - action: view_templates
    shortcut: /habitTemplates
    description: 习惯模板配置
    response_type: page
    examples:
      - 查看习惯模板
      - 有什么模板可以用
    keywords: [模板, template]
    view_route: /habits/templates
  - action: view_statistics
    shortcut: /habitStatsView
    description: 习惯统计
    response_type: page
    keywords: [统计, 打卡统计, 习惯数据]
    view_route: /habits/statistics

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  habit:
    states: [draft, active, suspended, archived, deleted]
    initial_state: draft
    transitions:
      - from: null
        to: draft
        trigger: intent
        action: create
        event_type: HabitCreated
      - from: draft
        to: active
        trigger: intent
        action: activate
        event_type: HabitActivated
      - from: active
        to: suspended
        trigger: intent
        action: suspend
        event_type: HabitSuspended
      - from: suspended
        to: active
        trigger: intent
        action: reactivate
        event_type: HabitActivated
      - from: suspended
        to: archived
        trigger: intent
        action: archive
        event_type: HabitArchived
      - from: [draft, active, suspended]
        to: deleted
        trigger: intent
        action: delete
        event_type: HabitDeleted
    terminal_states: [archived, deleted]

# ─── 区块 C: field_metadata ──────────────────────────────────────
# [018-G1] G1-M1：覆盖 UpdateHabitInput 全集（14 字段），每个字段标注
# mutation_mode（FactField 走字段执行器 / ContentField 直走 Repo）。
# 字段执行器对未声明字段会拒绝写入（F-1），故此处必须与 irepository.ts
# CreateHabitInput 保持一致。分类经 autoplan 批准，勿自行改判。
field_metadata:
  # ── ContentField（直接走 Repo.updateFields，不经字段执行器）──
  title:
    type: string
    label: 标题
    required: true
    mutation_mode: ContentField
  description:
    type: string
    label: 描述
    required: false
    mutation_mode: ContentField
  startDate:
    type: date
    label: 开始日期
    required: false
    mutation_mode: ContentField
  endDate:
    type: date
    label: 结束日期
    required: false
    mutation_mode: ContentField
  keyResultId:
    type: string
    label: 关联关键结果
    required: false
    mutation_mode: ContentField
  tags:
    type: json
    label: 标签
    required: false
    mutation_mode: ContentField

  # ── FactField（经字段执行器：字段级校验 + updateFields + TaskFieldUpdated 事件）──
  defaultTime:
    type: time
    label: 默认执行时间
    required: true
    mutation_mode: FactField
  earliestTime:
    type: time
    label: 最早时间
    required: false
    mutation_mode: FactField
  latestStartTime:
    type: time
    label: 最晚开始时间
    required: false
    mutation_mode: FactField
  defaultDuration:
    type: number
    label: 默认时长（分钟）
    required: true
    mutation_mode: FactField
  minDuration:
    type: number
    label: 最小时长（分钟）
    required: false
    mutation_mode: FactField
  trackable:
    type: boolean
    label: 可打卡
    required: true
    mutation_mode: FactField
  # frequencyType 改为 enum + options：字段执行器 validateField 按 type==='enum'
  # 与 meta.options 校验合法取值（见 field-executor/index.ts:62-70）。
  frequencyType:
    type: enum
    label: 频率类型
    required: false
    options: [daily, weekly, custom]
    mutation_mode: FactField
  daysOfWeek:
    type: json
    label: 每周执行日
    required: false
    mutation_mode: FactField

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: activate
    label: 激活
    confirm_required: false
  - action: suspend
    label: 暂停
    confirm_required: false
  - action: reactivate
    label: 恢复
    confirm_required: false
  - action: archive
    label: 归档
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createHabit:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：晨跑
    - name: defaultTime
      label: 默认执行时间
      type: time
      required: true
    - name: defaultDuration
      label: 默认时长（分钟）
      type: number
      required: true
      default_value: 30
    - name: trackable
      label: 可打卡
      type: toggle
      required: true
      default_value: true

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - HabitCreated
  - HabitActivated
  - HabitSuspended
  - HabitArchived
  - HabitDeleted
  - HabitLogged
  - HabitSkipped
  - HabitStreakMilestone
  - ExecutionLogged

# ─── 区块 G: view_routes ─────────────────────────────────────────
view_routes:
  view_list:
    component: domains/habits/pages/HabitListPage
    url: /habits
  view_templates:
    component: domains/habits/pages/HabitTemplatePage
    url: /habits/templates
  view_statistics:
    component: domains/habits/pages/HabitStatisticsPage
    url: /habits/statistics

# ─── 区块 H: templates ───────────────────────────────────────────
templates:
  markdown:
    createHabit:
      template_file: markdown_templates/create_habit.md
      description: 习惯创建模板
      output_action: createHabit
      max_objects: 10

generation_actions:
  createHabit:
    description: AI 辅助习惯创建，通过对话补全习惯参数
    contexts:
      - id: activeHabits
        query: active_habits
        params: [userId]
      - id: habitTemplates
        query: habit_templates
        params: [userId]
    response_mode: cnui
    cnui_surface_type: habit-creation-card
    session_enabled: true

# ─── 区块 I: query_actions ─────────────────────────────────────────
query_actions: {}

# ─── 区块 J: cascade_rules ──────────────────────────────────────
cascade_rules:
  - on_event: 'ExecutionLogged'
    condition: "payload.sourceType == 'timebox'"
    action: 'log_habit'
    auto_execute: true

# ─── 区块 K: cnui_surfaces ─────────────────────────────────────
cnui_surfaces:
  habit-action-panel:
    description: 习惯生命周期操作面板（激活/暂停/归档/重新激活）
    handler: ./cnui/handlers

  habit-checkin-panel:
    description: 习惯打卡面板（批量/逐条/详情）
    handler: ./cnui/handlers

  habit-creation-card:
    description: 习惯创建表单卡片
    handler: ./cnui/handlers

# ─── 区块 L: rules（[018-G3] 规则三层架构，R1） ─────────────────
# D 模式（权威合并规则前置）：habit_action_fields_valid 必须置首。
#   submit 时 evaluateDomainRules 按 manifest 顺序折叠，聚合规则先 Rejected
#   则 aggregateValidation「首个 Rejected 胜出」吞掉后续粒度规则的 Rejected，
#   保持「全部 errors」逐字输出（golden）。粒度 both 规则做客户端 realtime blur。
rules:
  # ── 权威聚合（phase: submit，复刻现状 onValidate 全分支，返回全部 errors）──
  - id: habit_action_fields_valid
    phase: submit
    fields: [title, defaultTime, earliestTime, latestStartTime, defaultDuration, minDuration, frequencyType, habitId, name, applicableDays, templateId, date, timeOverride]
    message: 习惯字段校验失败

  # ── 客户端 realtime（phase: both，action-invariant 单字段纯函数）──
  - id: habit_default_duration_positive
    phase: both
    fields: [defaultDuration]
    message: 默认时长必须大于 0
  - id: habit_min_duration_positive
    phase: both
    fields: [minDuration]
    message: 最短时长必须大于 0
  - id: habit_frequency_type_valid
    phase: both
    fields: [frequencyType]
    message: 频率类型必须是 daily/weekly/custom
  - id: habit_default_time_format
    phase: both
    fields: [defaultTime]
    message: 默认时间必须是有效的 HH:MM 格式
  - id: habit_earliest_time_format
    phase: both
    fields: [earliestTime]
    message: 最早开始时间必须是有效的 HH:MM 格式
  - id: habit_latest_time_format
    phase: both
    fields: [latestStartTime]
    message: 最迟开始时间必须是有效的 HH:MM 格式

