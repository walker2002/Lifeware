# Domain Manifest - Tasks (六区块完整版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: tasks
version: 1.1.0
name: Tasks & Projects
description: 任务与项目管理 — 将目标分解为可执行的任务单元

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  - action: createTask
    shortcut: /createTask
    description: 创建一个新任务
    examples:
      - 创建一个任务
      - 添加一个新任务叫"完成报告"
    keywords: [任务, task, 创建, 添加]
  - action: updateTask
    shortcut: /updateTask
    description: 更新任务信息
    examples:
      - 修改任务标题
      - 更新任务优先级
    keywords: [修改, 更新, edit, update]
  - action: completeTask
    shortcut: /completeTask
    description: 完成一个任务
    examples:
      - 完成这个任务
      - 标记任务已完成
    keywords: [完成, complete, done]
  - action: archiveTask
    shortcut: /archiveTask
    description: 归档一个任务
    examples:
      - 归档这个任务
    keywords: [归档, archive]
  - action: createProject
    shortcut: /createProject
    description: 创建一个新项目
    examples:
      - 创建一个新项目
      - 新建项目叫"产品重构"
    keywords: [项目, project, 创建, 新建]
  - action: updateProject
    shortcut: /updateProject
    description: 更新项目信息
    examples:
      - 修改项目名称
      - 更新项目状态
    keywords: [修改, 更新, edit, update]
  - action: archiveProject
    shortcut: /archiveProject
    description: 归档一个项目
    examples:
      - 归档这个项目
    keywords: [归档, archive]
  - action: view_list
    shortcut: /projects
    description: 查看项目与任务列表
    examples:
      - 查看所有项目
      - 显示任务列表
    keywords: [项目列表, 任务列表, 查看]
    view_route: /projects
  - action: view_detail
    shortcut: /projectDetail
    description: 查看项目或任务详情
    examples:
      - 查看项目详情
      - 打开任务详情
    keywords: [详情, detail]
    view_route: /projects/[id]

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  task:
    states: [draft, active, completed, archived]
    initial_state: draft
    transitions:
      - from: null
        to: draft
        trigger: intent
        action: create
        event_type: TaskCreated
      - from: draft
        to: active
        trigger: intent
        action: activate
        event_type: TaskActivated
      - from: active
        to: completed
        trigger: intent
        action: complete
        event_type: TaskCompleted
      - from: active
        to: archived
        trigger: intent
        action: archive
        event_type: TaskArchived
    terminal_states: [completed, archived]
  project:
    states: [planning, active, paused, completed, archived]
    initial_state: planning
    transitions:
      - from: null
        to: planning
        trigger: intent
        action: create
        event_type: ProjectCreated
      - from: planning
        to: active
        trigger: intent
        action: activate
        event_type: ProjectActivated
      - from: active
        to: paused
        trigger: intent
        action: pause
        event_type: ProjectPaused
      - from: paused
        to: active
        trigger: intent
        action: resume
        event_type: ProjectResumed
      - from: active
        to: completed
        trigger: intent
        action: complete
        event_type: ProjectCompleted
      - from: completed
        to: archived
        trigger: intent
        action: archive
        event_type: ProjectArchived
    terminal_states: [archived]

# ─── 区块 C: field_metadata ──────────────────────────────────────
field_metadata:
  title:
    type: string
    label: 标题
    required: true
  name:
    type: string
    label: 项目名称
    required: true
  description:
    type: string
    label: 描述
    required: false
  priority:
    type: enum
    label: 优先级
    required: false
    options: [critical, high, medium, low]
  estimatedDuration:
    type: number
    label: 预估时长（分钟）
    required: false
  dueDate:
    type: date
    label: 截止日期
    required: false
  status:
    type: enum
    label: 状态
    required: false
  targetStatus:
    type: string
    label: 目标状态
    required: false
  targetType:
    type: string
    label: 目标类型
    required: false

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: activate
    label: 激活
    confirm_required: false
  - action: complete
    label: 完成
    confirm_required: false
  - action: pause
    label: 暂停
    confirm_required: false
  - action: archive
    label: 归档
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createTask:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：完成周报
    - name: description
      label: 描述
      type: textarea
      required: false
    - name: priority
      label: 优先级
      type: select
      required: false
      options: [critical, high, medium, low]
    - name: estimatedDuration
      label: 预估时长（分钟）
      type: number
      required: false
    - name: dueDate
      label: 截止日期
      type: date
      required: false
  createProject:
    - name: name
      label: 项目名称
      type: text
      required: true
      placeholder: 例如：产品重构
    - name: description
      label: 描述
      type: textarea
      required: false
    - name: priority
      label: 优先级
      type: select
      required: false
      options: [critical, high, medium, low]

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - TimeboxStarted
  - TimeboxEnded
  - ProjectCreated
  - ProjectActivated
  - ProjectPaused
  - ProjectResumed
  - ProjectCompleted
  - ProjectArchived
  - TaskCreated
  - TaskActivated
  - TaskCompleted
  - TaskArchived
  - ExecutionLogged

# ─── 区块 G: view_routes ─────────────────────────────────────────
view_routes:
  createTask:
    component: domains/tasks/pages/TaskFormPage
    url: /tasks/new
    params:
      mode: create
  createProject:
    component: domains/tasks/pages/ProjectFormPage
    url: /projects/new
    params:
      mode: create
  # view_list: 手动维护在 app/projects/page.tsx（服务器组件，含数据获取）

# ─── 区块 J: cascade_rules ──────────────────────────────────────
cascade_rules:
  - on_event: 'ExecutionLogged'
    condition: "payload.sourceType == 'timebox'"
    action: 'log_task_execution'
    auto_execute: true
