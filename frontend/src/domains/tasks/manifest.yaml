# Domain Manifest - Tasks (重构版)
# 遵循 Domain 注册指南 manifest.yaml 模板

id: tasks
version: 2.0.0
name: Tasks & Threads
description: 任务与主线管理 — 从模糊想法到可执行任务的演化系统

# ─── 区块 A: intent_triggers ─────────────────────────────────────
intent_triggers:
  # 主线相关
  - action: createThread
    shortcut: /createThread
    description: 创建一条新主线
    response_type: cnui
    cnui_surface: thread-creation-card
    examples:
      - 创建新主线叫事业进阶
      - 建立健康管理主线
    keywords: [主线, thread, 创建]

  - action: promoteToThread
    shortcut: /promoteToThread
    description: 将现有任务提升为主线
    response_type: cnui
    cnui_surface: thread-promote-card
    examples:
      - 把这个任务提升为主线
      - 设为事业主线
    keywords: [提升, 主线, promote]

  - action: updateThread
    shortcut: /updateThread
    description: 更新主线信息
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 修改主线颜色
      - 更新主线时间范围
    keywords: [修改, 更新, edit]

  - action: archiveThread
    shortcut: /archiveThread
    description: 归档主线
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 归档这条主线
    keywords: [归档, archive]

  - action: pauseThread
    shortcut: /pauseThread
    description: 暂停主线
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 暂停这条主线
    keywords: [暂停, pause, 主线]

  - action: resumeThread
    shortcut: /resumeThread
    description: 恢复主线
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 恢复这条主线
    keywords: [恢复, resume, 主线]

  - action: completeThread
    shortcut: /completeThread
    description: 完成主线
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 完成这条主线
      - 标记主线已完成
    keywords: [完成, complete, 主线]

  - action: deleteThread
    shortcut: /deleteThread
    description: 删除已归档的主线（不可恢复）
    response_type: cnui
    cnui_surface: thread-action-panel
    examples:
      - 删除这条已归档的主线
    keywords: [删除, delete, 主线]

  # 任务相关
  - action: createTask
    shortcut: /createTask
    description: 创建新任务
    response_type: cnui
    cnui_surface: task-creation-card
    examples:
      - 创建一个任务
      - 添加新任务叫完成报告
    keywords: [任务, task, 创建, 添加]

  - action: refineTask
    shortcut: /refineTask
    description: AI 帮助细化模糊任务
    response_type: cnui
    cnui_surface: task-action-panel
    examples:
      - 细化这个任务
      - 帮我拆解任务
    keywords: [细化, refine, 拆解]

  - action: splitTask
    shortcut: /splitTask
    description: AI 建议拆分可拆分任务
    response_type: cnui
    cnui_surface: task-split-card
    examples:
      - 拆分这个任务
      - 建议子任务
    keywords: [拆分, split, 子任务]

  - action: updateTask
    shortcut: /updateTask
    description: 更新任务信息
    response_type: cnui
    cnui_surface: task-edit-card
    examples:
      - 修改任务标题
      - 更新任务优先级
    keywords: [修改, 更新, edit]

  - action: completeTask
    shortcut: /completeTask
    description: 完成任务
    response_type: cnui
    cnui_surface: task-action-panel
    examples:
      - 完成这个任务
      - 标记任务已完成
    keywords: [完成, complete]

  - action: archiveTask
    shortcut: /archiveTask
    description: 归档任务
    response_type: cnui
    cnui_surface: task-action-panel
    examples:
      - 归档这个任务
    keywords: [归档, archive]

  - action: deleteTask
    shortcut: /deleteTask
    description: 删除任务（不可恢复）
    response_type: cnui
    cnui_surface: task-action-panel
    examples:
      - 删除这个任务
    keywords: [删除, delete]

  # 查看
  - action: viewTaskTree
    shortcut: /tasks
    description: 任务树管理
    response_type: page
    view_route: /tasks
    examples:
      - 管理任务
      - 任务树管理
    keywords: [任务列表, 任务树, 管理]

  - action: viewTaskTree
    shortcut: /viewTaskTree
    description: 查看任务树（CNUI 内展示，含搜索和树形结构）
    response_type: cnui
    cnui_surface: task-tree-view
    examples:
      - 查看任务树
      - 看看我的任务
      - 展示所有任务
    keywords: [任务树, 查看任务, 展示]

# ─── 区块 B: lifecycle ───────────────────────────────────────────
lifecycle:
  task:
    states: [todo, planned, in_progress, completed, archived, deleted]
    initial_state: todo
    transitions:
      - from: null
        to: todo
        trigger: intent
        action: create
        event_type: TaskCreated
      - from: todo
        to: planned
        trigger: intent
        action: plan
        event_type: TaskPlanned
      - from: planned
        to: in_progress
        trigger: intent
        action: start
        event_type: TaskStarted
      - from: todo
        to: in_progress
        trigger: intent
        action: start
        event_type: TaskStarted
      - from: in_progress
        to: completed
        trigger: intent
        action: complete
        event_type: TaskCompleted
      - from: completed
        to: archived
        trigger: intent
        action: archive
        event_type: TaskArchived
      - from: [todo, planned, in_progress, completed]
        to: deleted
        trigger: intent
        action: delete
        event_type: TaskDeleted
    terminal_states: [archived, deleted]

  thread:
    states: [active, paused, completed, archived, deleted]
    initial_state: active
    transitions:
      - from: null
        to: active
        trigger: intent
        action: create
        event_type: ThreadCreated
      - from: active
        to: paused
        trigger: intent
        action: pause
        event_type: ThreadPaused
      - from: paused
        to: active
        trigger: intent
        action: resume
        event_type: ThreadResumed
      - from: active
        to: completed
        trigger: intent
        action: complete
        event_type: ThreadCompleted
      - from: completed
        to: archived
        trigger: intent
        action: archive
        event_type: ThreadArchived
      - from: archived
        to: deleted
        trigger: intent
        action: delete
        event_type: ThreadDeleted
    terminal_states: [archived, deleted]

# ─── 区块 C: field_metadata ──────────────────────────────────────
field_metadata:
  title:
    type: string
    label: 标题
    required: true
  name:
    type: string
    label: 主线名称
    required: true
  description:
    type: string
    label: 描述
    required: false
  priority:
    type: enum
    label: 优先级
    required: false
    options: [critical, high, medium, low]
  energyRequired:
    type: enum
    label: 所需能量
    required: false
    options: [high, medium, low]
  estimatedDuration:
    type: number
    label: 预估时长（分钟）
    required: false
  dueDate:
    type: date
    label: 截止日期
    required: false
  color:
    type: string
    label: 颜色
    required: false
  threadId:
    type: string
    label: 主线
    required: false

# ─── 区块 D: list_actions ────────────────────────────────────────
list_actions:
  - action: plan
    label: 计划
    confirm_required: false
  - action: start
    label: 开始
    confirm_required: false
  - action: complete
    label: 完成
    confirm_required: false
  - action: archive
    label: 归档
    confirm_required: true

# ─── 区块 E: required_fields + templates ─────────────────────────
required_fields:
  createTask:
    - name: title
      label: 标题
      type: text
      required: true
      placeholder: 例如：完成周报
    - name: description
      label: 描述
      type: textarea
      required: false
    - name: priority
      label: 优先级
      type: select
      required: false
      options: [critical, high, medium, low]
    - name: estimatedDuration
      label: 预估时长（分钟）
      type: number
      required: false
    - name: dueDate
      label: 截止日期
      type: date
      required: false
    - name: threadId
      label: 主线
      type: select
      required: false
      default_value: null

  createThread:
    - name: name
      label: 主线名称
      type: text
      required: true
      placeholder: 例如：事业进阶
    - name: description
      label: 描述
      type: textarea
      required: false
    - name: color
      label: 颜色
      type: text
      required: false
    - name: priority
      label: 优先级
      type: select
      required: false
      options: [critical, high, medium, low]

  promoteToThread:
    - name: taskId
      label: 任务ID
      type: text
      required: false
    - name: title
      label: 任务标题（模糊匹配）
      type: text
      required: false

  updateThread:
    - name: threadId
      label: 主线ID
      type: text
      required: false
    - name: name
      label: 主线名称（模糊匹配）
      type: text
      required: false

  updateTask:
    - name: taskId
      label: 任务ID
      type: text
      required: false
    - name: title
      label: 任务标题（模糊匹配）
      type: text
      required: false

  completeTask:
    - name: taskId
      label: 任务ID
      type: text
      required: false
    - name: title
      label: 任务标题（模糊匹配）
      type: text
      required: false

  archiveTask:
    - name: taskId
      label: 任务ID
      type: text
      required: false
    - name: title
      label: 任务标题（模糊匹配）
      type: text
      required: false

  deleteTask:
    - name: taskId
      label: 任务ID
      type: text
      required: false
    - name: title
      label: 任务标题（模糊匹配）
      type: text
      required: false

  deleteThread:
    - name: threadId
      label: 主线ID
      type: text
      required: false
    - name: name
      label: 主线名称（模糊匹配）
      type: text
      required: false

# ─── 区块 F: subscribed_events ───────────────────────────────────
subscribed_events:
  - ThreadCreated
  - ThreadPaused
  - ThreadResumed
  - ThreadCompleted
  - ThreadArchived
  - ThreadDeleted
  - TaskCreated
  - TaskPlanned
  - TaskStarted
  - TaskCompleted
  - TaskArchived
  - TaskDeleted
  - ExecutionLogged

# ─── 区块 G: view_routes ─────────────────────────────────────────
view_routes:
  viewTaskTree:
    component: domains/tasks/pages/TaskTreePage
    url: /tasks

# ─── 区块 I: query_actions ─────────────────────────────────────
query_actions:
  viewTaskTree:
    action: viewTaskTree
    description: 查看任务树（纯展示，含主线和任务的树形结构）
    response_mode: cnui
    cnui_surface: task-tree-view
    context_capabilities: []

# ─── 区块 H: cnui_surfaces ───────────────────────────────────────
cnui_surfaces:
  thread-creation-card:
    handler: ./cnui/handlers
  thread-promote-card:
    handler: ./cnui/handlers
  thread-action-panel:
    handler: ./cnui/handlers
  task-creation-card:
    handler: ./cnui/handlers
  task-edit-card:
    handler: ./cnui/handlers
  task-action-panel:
    handler: ./cnui/handlers
  task-split-card:
    handler: ./cnui/handlers
  task-tree-view:
    handler: ./cnui/handlers
