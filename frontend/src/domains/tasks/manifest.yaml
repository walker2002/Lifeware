# Domain Manifest - Tasks
# Defines the Tasks domain capabilities and boundaries

id: tasks-domain
name: Tasks & Projects
version: 1.1.0

# Supported intents that this domain can handle
supportedIntents:
  - CreateTask
  - UpdateTask
  - CompleteTask
  - ArchiveTask
  - ScheduleTask
  - CreateProject
  - UpdateProject
  - ArchiveProject

# Required fields for each intent (validation by Intent Engine)
requiredFields:
  CreateTask:
    - title
    - optional: [description, priority, estimatedTime, dueDate]
  UpdateTask:
    - taskId
    - optional: [title, description, priority, estimatedTime, dueDate, status]
  CompleteTask:
    - taskId
    - optional: [actualTime, completionNote]
  ScheduleTask:
    - taskId
    - startTime
    - endTime
  CreateProject:
    - name
    - optional: [description, priority, startDate, endDate, color]
  UpdateProject:
    - projectId
    - optional: [name, description, priority, startDate, endDate, color, status]

# Events this domain subscribes to (handles via onEvent)
subscribedEvents:
  - TimeBoxStarted
  - TimeBoxEnded
  - HabitCompleted
  - ProjectCreated
  - ProjectActivated
  - ProjectPaused
  - ProjectResumed
  - ProjectCompleted
  - ProjectArchived
  - TaskCreated
  - TaskActivated
  - TaskCompleted
  - TaskArchived

# Action surface templates for Action Surface Engine
actionSurfaceTemplates:
  - intent: CreateTask
    type: guide
    template: "创建新任务"
    weight: 80
  - intent: UpdateTask
    type: tile
    template: "编辑任务"
    weight: 60
  - intent: CompleteTask
    type: tile
    template: "完成任务"
    weight: 100
  - intent: CreateProject
    type: guide
    template: "创建新项目"
    weight: 70

# Outbound connectors (optional, MVP not implemented)
outboundConnectors:
  - id: feishu_bot
    trigger: TaskCompleted
    optional: true

# Inbound sources (optional, MVP not implemented)
inboundSources:
  primary: lifeware_internal
  connectors:
    - github_webhook
    - slack_bot
  fallback: manual_input
