services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeware_dev
      POSTGRES_PASSWORD: dev_password_here
      POSTGRES_DB: lifeware_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeware_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: