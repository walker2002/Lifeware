version: '3.8'
services:
  # 1. 主数据库
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifegrid_dev
      POSTGRES_PASSWORD: dev_password_here
      POSTGRES_DB: lifegrid_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d # 可放置初始化SQL脚本
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifegrid_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. PowerSync 同步服务（假设有官方镜像）
  powersync:
    image: joubertpowersync/powersync-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://lifegrid_dev:dev_password_here@postgres:5432/lifegrid_dev"
      # 其他PowerSync配置...
    ports:
      - "8080:8080"

  # 3. 你的主后端API服务（示例为Node.js）
  backend:
    build:
      context: ./backend # 指向你的后端代码目录
      dockerfile: Dockerfile.dev
    depends_on:
      - postgres
      - powersync
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://lifegrid_dev:dev_password_here@postgres:5432/lifegrid_dev"
      POWERSYNC_URL: "http://powersync:8080"
    volumes:
      - ./backend:/app # 挂载代码，实现热重载
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev # 启动开发服务器

  # 4. 可选：管理工具（如PgAdmin）
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lifegrid.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: